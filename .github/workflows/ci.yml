name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        # Note: `--fatal-infos` removed because upstream chetstriker/LLMtary
        # carries pre-existing `info`-level analyzer hits
        # (use_build_context_synchronously, deprecated_member_use).
        # The fork tracks upstream, so the gate is aligned with upstream's
        # looser baseline. Warnings and errors still fail CI.
        run: flutter analyze

      - name: flutter test
        run: flutter test
